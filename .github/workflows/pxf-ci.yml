# Apache Cloudberry PXF CI Workflow
# --------------------------------------------------------------------
name: PXF CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  JAVA_VERSION: "11"
  JAVA_HOME: "/usr/lib/jvm/java-11-openjdk"
  GO_VERSION: "1.24"
  GPHOME: "/usr/local/cloudberry-db"
  CLOUDBERRY_VERSION: "main"
  PXF_HOME: "/usr/local/pxf"

jobs:
  # Stage 1: Build artifacts (runs in parallel)
  build-cloudberry-deb:
    name: Build Cloudberry DEB Package
    runs-on: ubuntu-latest
    container:
      image: apache/incubator-cloudberry:cbdb-build-ubuntu22.04-latest
      options: --user root
    steps:
    - name: Get month number
      id: get-month
      run: echo "month=$(/bin/date -u '+%Y-%m')" >> "$GITHUB_OUTPUT"

    - name: Restore DEB cache
      id: cache-deb
      uses: actions/cache/restore@v4
      with:
        path: |
          workspace/cloudberry-deb
          workspace/cloudberry-source.tar.gz
        key: cloudberry-deb-${{ runner.os }}-${{ steps.get-month.outputs.month }}

    - name: Checkout Cloudberry source
      if: steps.cache-deb.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: apache/cloudberry
        ref: ${{ env.CLOUDBERRY_VERSION }}
        path: workspace/cloudberry
        submodules: true

    - name: Checkout PXF source (for build script)
      if: steps.cache-deb.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        path: cloudberry-pxf

    - name: Build Cloudberry DEB
      if: steps.cache-deb.outputs.cache-hit != 'true'
      run: |
        export WORKSPACE=$PWD/workspace
        export CLOUDBERRY_VERSION=99.0.0
        export CLOUDBERRY_BUILD=1
        bash cloudberry-pxf/ci/docker/pxf-cbdb-dev/ubuntu/script/build_cloudberry_deb.sh

    - name: Package Cloudberry source
      if: steps.cache-deb.outputs.cache-hit != 'true'
      run: |
        cd workspace
        tar czf cloudberry-source.tar.gz cloudberry/

    - name: Save DEB cache
      # save cache from default branch only (this cache can be reused between PRs)
      if: steps.cache-deb.outputs.cache-hit != 'true' && github.ref == 'refs/heads/main'
      uses: actions/cache/save@v4
      with:
        path: |
          workspace/cloudberry-deb
          workspace/cloudberry-source.tar.gz
        key: cloudberry-deb-${{ runner.os }}-${{ steps.get-month.outputs.month }}

    - name: Upload DEB artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudberry-deb
        path: workspace/cloudberry-deb/*.deb
        retention-days: 7

    - name: Upload Cloudberry source artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudberry-source
        path: workspace/cloudberry-source.tar.gz
        retention-days: 7

  build-cloudberry-rpm:
    name: Build Cloudberry RPM Package
    runs-on: ubuntu-latest
    container:
      image: apache/incubator-cloudberry:cbdb-build-rocky9-latest
      options: --user root
    steps:
    - name: Get month number
      id: get-month
      run: echo "month=$(/bin/date -u '+%Y-%m')" >> "$GITHUB_OUTPUT"

    - name: Restore RPM cache
      id: cache-rpm
      uses: actions/cache/restore@v4
      with:
        path: |
          workspace/cloudberry-rpm
          workspace/cloudberry-source-rocky9.tar.gz
        key: cloudberry-rpm-${{ runner.os }}-${{ steps.get-month.outputs.month }}

    - name: Checkout Cloudberry source
      if: steps.cache-rpm.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: apache/cloudberry
        ref: ${{ env.CLOUDBERRY_VERSION }}
        path: workspace/cloudberry
        submodules: true

    - name: Checkout PXF source (for build script)
      if: steps.cache-rpm.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        path: cloudberry-pxf

    - name: Build Cloudberry RPM
      if: steps.cache-rpm.outputs.cache-hit != 'true'
      run: |
        export WORKSPACE=$PWD/workspace
        export CLOUDBERRY_VERSION=99.0.0
        export CLOUDBERRY_BUILD=1
        bash cloudberry-pxf/ci/docker/pxf-cbdb-dev/rocky9/script/build_cloudberry_rpm.sh

    - name: Package Cloudberry source
      if: steps.cache-rpm.outputs.cache-hit != 'true'
      run: |
        cd workspace
        tar czf cloudberry-source-rocky9.tar.gz cloudberry/

    - name: Save RPM cache
      # save cache from default branch only (this cache can be reused between PRs)
      if: steps.cache-rpm.outputs.cache-hit != 'true' && github.ref == 'refs/heads/main'
      uses: actions/cache/save@v4
      with:
        path: |
          workspace/cloudberry-rpm
          workspace/cloudberry-source-rocky9.tar.gz
        key: cloudberry-rpm-${{ runner.os }}-${{ steps.get-month.outputs.month }}

    - name: Upload RPM artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudberry-rpm
        path: workspace/cloudberry-rpm/*.rpm
        retention-days: 7

    - name: Upload Cloudberry source artifact (Rocky 9)
      uses: actions/upload-artifact@v4
      with:
        name: cloudberry-source-rocky9
        path: workspace/cloudberry-source-rocky9.tar.gz
        retention-days: 7

  build-docker-images:
    name: Build Docker Images (Ubuntu)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PXF source
      uses: actions/checkout@v4
      with:
        path: cloudberry-pxf

    - name: Build singlecluster image
      run: |
        cd cloudberry-pxf/ci/singlecluster
        docker build -t pxf/singlecluster:3 .
        docker save pxf/singlecluster:3 > /tmp/singlecluster-image.tar

    - name: Upload singlecluster image
      uses: actions/upload-artifact@v4
      with:
        name: singlecluster-image
        path: /tmp/singlecluster-image.tar
        retention-days: 1

  java-compatibility-test:
    name: build-and-test with java v${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8', '11', '17', '21' ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'corretto'
      - name: Assemble and test with Gradle
        working-directory: ./server
        run: make test

  build-docker-images-rocky9:
    name: Build Docker Images (Rocky 9)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PXF source
      uses: actions/checkout@v4
      with:
        path: cloudberry-pxf

    - name: Build singlecluster Rocky 9 image
      run: |
        cd cloudberry-pxf/ci/singlecluster
        docker build --build-arg BASE_IMAGE=apache/incubator-cloudberry:cbdb-build-rocky9-latest -t pxf/singlecluster-rocky9:3 .
        docker save pxf/singlecluster-rocky9:3 > /tmp/singlecluster-rocky9-image.tar

    - name: Upload singlecluster Rocky 9 image
      uses: actions/upload-artifact@v4
      with:
        name: singlecluster-rocky9-image
        path: /tmp/singlecluster-rocky9-image.tar
        retention-days: 1

  build-pxf-cbdb-testcontainer-image:
    name: Build Testcontainer Images (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: ubuntu
            base_image: apache/incubator-cloudberry:cbdb-build-ubuntu22.04-latest
            image_tag: pxf/cbdb-testcontainer-ubuntu:1
          - distro: rocky9
            base_image: apache/incubator-cloudberry:cbdb-build-rocky9-latest
            image_tag: pxf/cbdb-testcontainer-rocky9:1
    steps:
      - name: Get month number
        id: get-month
        run: echo "month=$(/bin/date -u '+%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Checkout PXF source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore testcontainer image cache
        id: cache-tc
        uses: actions/cache/restore@v4
        with:
          path: pxf-cbdb-testcontainer-${{ matrix.distro }}.tar
          key: pxf-cbdb-testcontainer-${{ matrix.distro }}-${{ steps.get-month.outputs.month }}-${{ hashFiles('automation/src/main/resources/testcontainers/pxf-cbdb/**') }}

      - name: Build testcontainer images
        if: steps.cache-tc.outputs.cache-hit != 'true'
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            -t ${{ matrix.image_tag }} \
            automation/src/main/resources/testcontainers/pxf-cbdb
          docker save ${{ matrix.image_tag }} > "${GITHUB_WORKSPACE}/pxf-cbdb-testcontainer-${{ matrix.distro }}.tar"

      - name: Save testcontainer image cache
        # save cache from default branch only (reuse between PRs for the same month and context)
        if: steps.cache-tc.outputs.cache-hit != 'true' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: pxf-cbdb-testcontainer-${{ matrix.distro }}.tar
          key: pxf-cbdb-testcontainer-${{ matrix.distro }}-${{ steps.get-month.outputs.month }}-${{ hashFiles('automation/src/main/resources/testcontainers/pxf-cbdb/**') }}

      - name: Upload testcontainer images
        uses: actions/upload-artifact@v4
        with:
          name: pxf-cbdb-testcontainer-image-${{ matrix.distro }}
          path: pxf-cbdb-testcontainer-${{ matrix.distro }}.tar
          retention-days: 1

  # Stage 2: Parallel test jobs using matrix strategy
  pxf-test:
    name: Test PXF - ${{ matrix.test_group }}
    needs: [build-cloudberry-deb, build-docker-images]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_group:
          - cli
          - external-table
          - fdw
          - sanity
          - smoke
          - hdfs
          - hcatalog
          - hcfs
          - hive
          - hbase
          - profile
          - jdbc
          - proxy
          - unused
          - s3
          - features
          - gpdb
          - gpdb_fdw
          - load
          - pxf_extension
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        sudo docker system prune -af
        df -h

    - name: Checkout PXF source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        path: cloudberry-pxf
        submodules: true

    - name: Download Cloudberry DEB
      uses: actions/download-artifact@v4
      with:
        name: cloudberry-deb
        path: /tmp

    - name: Download Cloudberry source
      uses: actions/download-artifact@v4
      with:
        name: cloudberry-source
        path: /tmp

    - name: Download singlecluster image
      uses: actions/download-artifact@v4
      with:
        name: singlecluster-image
        path: /tmp

    - name: Load singlecluster image
      run: |
        docker load < /tmp/singlecluster-image.tar

    - name: Prepare Cloudberry source
      run: |
        tar xzf /tmp/cloudberry-source.tar.gz
        chmod -R u+rwX,go+rX cloudberry

    - name: Start Services
      id: start_services
      run: |
        cd cloudberry-pxf
        docker compose -f ci/docker/pxf-cbdb-dev/ubuntu/docker-compose.yml down -v || true
        docker compose -f ci/docker/pxf-cbdb-dev/ubuntu/docker-compose.yml up -d
        docker exec pxf-cbdb-dev sudo chown -R gpadmin:gpadmin /home/gpadmin/workspace/cloudberry
        docker cp /tmp/*.deb pxf-cbdb-dev:/tmp/
        docker exec pxf-cbdb-dev sudo chown gpadmin:gpadmin /tmp/*.deb
        docker exec pxf-cbdb-dev bash -lc "cd /home/gpadmin/workspace/cloudberry-pxf && ./ci/docker/pxf-cbdb-dev/common/script/entrypoint.sh"

    - name: Run Test - ${{ matrix.test_group }}
      id: run_test
      continue-on-error: true
      timeout-minutes: 120
      run: |
        docker exec pxf-cbdb-dev bash -lc "cd /home/gpadmin/workspace/cloudberry-pxf/automation && source ../ci/docker/pxf-cbdb-dev/common/script/pxf-env.sh && ../ci/docker/pxf-cbdb-dev/common/script/run_tests.sh ${{ matrix.test_group }}"
        
    - name: Collect artifacts and generate stats
      if: always()
      id: collect_artifacts
      run: |
        mkdir -p artifacts/logs
        TEST_GROUP="${{ matrix.test_group }}"
        TEST_RESULT="${{ steps.run_test.outcome }}"
        
        # Initialize counters
        TOTAL=0
        PASSED=0
        FAILED=0
        SKIPPED=0
        
        # Copy test artifacts
        cp -r cloudberry-pxf/automation/test_artifacts/* artifacts/ 2>/dev/null || true
        docker exec pxf-cbdb-dev bash -c "cp -r /usr/local/pxf/logs/* /tmp/pxf-logs/ 2>/dev/null || true" || true
        docker cp pxf-cbdb-dev:/tmp/pxf-logs artifacts/logs/ 2>/dev/null || true
        
        # Parse surefire reports for automation tests
        if [[ "$TEST_GROUP" != "cli" && "$TEST_GROUP" != "server" ]]; then
          for xml in cloudberry-pxf/automation/target/surefire-reports/TEST-*.xml; do
            if [ -f "$xml" ]; then
              tests=$(grep -oP 'tests="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              failures=$(grep -oP 'failures="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              errors=$(grep -oP 'errors="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              skipped=$(grep -oP 'skipped="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              
              TOTAL=$((TOTAL + tests))
              FAILED=$((FAILED + failures + errors))
              SKIPPED=$((SKIPPED + skipped))
            fi
          done
          PASSED=$((TOTAL - FAILED - SKIPPED))
        fi
        
        # Generate stats JSON
        cat > artifacts/test_stats.json <<EOF
        {
          "group": "$TEST_GROUP",
          "result": "$TEST_RESULT",
          "total": $TOTAL,
          "passed": $PASSED,
          "failed": $FAILED,
          "skipped": $SKIPPED
        }
        EOF
        
        echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
        echo "skipped_count=$SKIPPED" >> $GITHUB_OUTPUT
        echo "Test stats for $TEST_GROUP: total=$TOTAL, passed=$PASSED, failed=$FAILED, skipped=$SKIPPED"

    - name: Cleanup containers
      if: always()
      run: |
        cd cloudberry-pxf
        docker compose -f ci/docker/pxf-cbdb-dev/ubuntu/docker-compose.yml down -v || true

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.test_group }}
        path: artifacts/**
        if-no-files-found: ignore
        retention-days: 7

    - name: Check test result
      if: always()
      run: |
        FAILED_COUNT="${{ steps.collect_artifacts.outputs.failed_count || 0 }}"
        SKIPPED_COUNT="${{ steps.collect_artifacts.outputs.skipped_count || 0 }}"
        
        if [ "${{ steps.run_test.outcome }}" == "failure" ] || [ "$FAILED_COUNT" -gt 0 ]; then
          echo "Test group ${{ matrix.test_group }} failed (Failures: $FAILED_COUNT, Skipped: $SKIPPED_COUNT)"
          exit 1
        fi

  # Stage 2b: Rocky 9 parallel test jobs
  pxf-test-rocky9:
    name: Test PXF Rocky9 - ${{ matrix.test_group }}
    needs: [build-cloudberry-rpm, build-docker-images-rocky9]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_group:
          - cli
          - external-table
          - fdw
          - server
          - sanity
          - smoke
          - hdfs
          - hcatalog
          - hcfs
          - hive
          - hbase
          - profile
          - jdbc
          - proxy
          - unused
          - s3
          - features
          - gpdb
          - gpdb_fdw
          - load
          - pxf_extension
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        sudo docker system prune -af
        df -h

    - name: Checkout PXF source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        path: cloudberry-pxf
        submodules: true

    - name: Download Cloudberry RPM
      uses: actions/download-artifact@v4
      with:
        name: cloudberry-rpm
        path: /tmp

    - name: Download Cloudberry source (Rocky 9)
      uses: actions/download-artifact@v4
      with:
        name: cloudberry-source-rocky9
        path: /tmp

    - name: Download singlecluster Rocky 9 image
      uses: actions/download-artifact@v4
      with:
        name: singlecluster-rocky9-image
        path: /tmp

    - name: Load singlecluster Rocky 9 image
      run: |
        docker load < /tmp/singlecluster-rocky9-image.tar

    - name: Prepare Cloudberry source
      run: |
        tar xzf /tmp/cloudberry-source-rocky9.tar.gz
        chmod -R u+rwX,go+rX cloudberry

    - name: Start Services
      id: start_services
      run: |
        cd cloudberry-pxf
        docker compose -f ci/docker/pxf-cbdb-dev/rocky9/docker-compose.yml down -v || true
        docker compose -f ci/docker/pxf-cbdb-dev/rocky9/docker-compose.yml up -d
        docker exec pxf-cbdb-dev sudo chown -R gpadmin:gpadmin /home/gpadmin/workspace/cloudberry
        docker cp /tmp/*.rpm pxf-cbdb-dev:/tmp/
        docker exec pxf-cbdb-dev sudo chown gpadmin:gpadmin /tmp/*.rpm
        docker exec pxf-cbdb-dev bash -lc "cd /home/gpadmin/workspace/cloudberry-pxf && ./ci/docker/pxf-cbdb-dev/common/script/entrypoint.sh"

    - name: Run Test - ${{ matrix.test_group }}
      id: run_test
      continue-on-error: true
      timeout-minutes: 120
      run: |
        docker exec pxf-cbdb-dev bash -lc "cd /home/gpadmin/workspace/cloudberry-pxf/automation && source ../ci/docker/pxf-cbdb-dev/common/script/pxf-env.sh && ../ci/docker/pxf-cbdb-dev/common/script/run_tests.sh ${{ matrix.test_group }}"

    - name: Collect artifacts and generate stats
      if: always()
      id: collect_artifacts
      run: |
        mkdir -p artifacts/logs
        TEST_GROUP="${{ matrix.test_group }}"
        TEST_RESULT="${{ steps.run_test.outcome }}"

        # Initialize counters
        TOTAL=0
        PASSED=0
        FAILED=0
        SKIPPED=0

        # Copy test artifacts
        cp -r cloudberry-pxf/automation/test_artifacts/* artifacts/ 2>/dev/null || true
        docker exec pxf-cbdb-dev bash -c "cp -r /usr/local/pxf/logs/* /tmp/pxf-logs/ 2>/dev/null || true" || true
        docker cp pxf-cbdb-dev:/tmp/pxf-logs artifacts/logs/ 2>/dev/null || true

        # Parse surefire reports for automation tests
        if [[ "$TEST_GROUP" != "cli" && "$TEST_GROUP" != "server" ]]; then
          for xml in cloudberry-pxf/automation/target/surefire-reports/TEST-*.xml; do
            if [ -f "$xml" ]; then
              tests=$(grep -oP 'tests="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              failures=$(grep -oP 'failures="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              errors=$(grep -oP 'errors="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              skipped=$(grep -oP 'skipped="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")

              TOTAL=$((TOTAL + tests))
              FAILED=$((FAILED + failures + errors))
              SKIPPED=$((SKIPPED + skipped))
            fi
          done
          PASSED=$((TOTAL - FAILED - SKIPPED))
        fi

        # Generate stats JSON
        cat > artifacts/test_stats.json <<EOF
        {
          "group": "$TEST_GROUP",
          "result": "$TEST_RESULT",
          "total": $TOTAL,
          "passed": $PASSED,
          "failed": $FAILED,
          "skipped": $SKIPPED
        }
        EOF

        echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
        echo "skipped_count=$SKIPPED" >> $GITHUB_OUTPUT
        echo "Test stats for $TEST_GROUP (Rocky 9): total=$TOTAL, passed=$PASSED, failed=$FAILED, skipped=$SKIPPED"

    - name: Cleanup containers
      if: always()
      run: |
        cd cloudberry-pxf
        docker compose -f ci/docker/pxf-cbdb-dev/rocky9/docker-compose.yml down -v || true

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-rocky9-${{ matrix.test_group }}
        path: artifacts/**
        if-no-files-found: ignore
        retention-days: 7

    - name: Check test result
      if: always()
      run: |
        FAILED_COUNT="${{ steps.collect_artifacts.outputs.failed_count || 0 }}"
        SKIPPED_COUNT="${{ steps.collect_artifacts.outputs.skipped_count || 0 }}"

        if [ "${{ steps.run_test.outcome }}" == "failure" ] || [ "$FAILED_COUNT" -gt 0 ]; then
          echo "Test group ${{ matrix.test_group }} (Rocky 9) failed (Failures: $FAILED_COUNT, Skipped: $SKIPPED_COUNT)"
          exit 1
        fi


  # Stage 2c: Testcontainers-based tests
  pxf-testcontainer-test:
    name: "TC Test - ${{ matrix.tc_group }} (${{ matrix.use_fdw == 'true' && 'fdw' || 'external-table' }}, ${{ matrix.distro }})"
    needs: [build-pxf-cbdb-testcontainer-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tc_group:
          - 'pxf-jdbc'
        use_fdw:
          - 'false'
          - 'true'
        distro:
          - 'ubuntu'
          - 'rocky9'
    steps:
      - name: Checkout PXF source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download pxf-cbdb testcontainer image
        uses: actions/download-artifact@v4
        with:
          name: pxf-cbdb-testcontainer-image-${{ matrix.distro }}
          path: /tmp

      - name: Load pxf-cbdb testcontainer image
        run: |
          docker load < /tmp/pxf-cbdb-testcontainer-${{ matrix.distro }}.tar

      - name: Build PXF stage artifacts (no unit tests)
        run: |
          make -C server stage-notest

      - name: Run Testcontainers tests - ${{ matrix.tc_group }} (${{ matrix.use_fdw == 'true' && 'fdw' || 'external-table' }}, ${{ matrix.distro }})
        id: run_test
        continue-on-error: true
        timeout-minutes: 120
        working-directory: automation
        env:
          PXF_HOME: ${{ github.workspace }}/server/build/stage
        run: |
          make test-tc TC_GROUP=${{ matrix.tc_group }} USE_FDW=${{ matrix.use_fdw }} DISTRO=${{ matrix.distro }}

      - name: Collect artifacts and generate stats
        if: always()
        id: collect_artifacts
        run: |
          mkdir -p artifacts/logs
          TC_GROUP="${{ matrix.tc_group }}"
          TEST_MODE="${{ matrix.use_fdw == 'true' && 'fdw' || 'external-table' }}"
          TEST_RESULT="${{ steps.run_test.outcome }}"

          # Copy test artifacts
          cp -r automation/automation_logs/* artifacts/ 2>/dev/null || true

          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0
          for xml in automation/target/surefire-reports/TEST-*.xml; do
            if [ -f "$xml" ]; then
              tests=$(grep -oP 'tests="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              failures=$(grep -oP 'failures="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              errors=$(grep -oP 'errors="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              skipped=$(grep -oP 'skipped="\K\d+' "$xml" 2>/dev/null | head -1 || echo "0")
              TOTAL=$((TOTAL + tests))
              FAILED=$((FAILED + failures + errors))
              SKIPPED=$((SKIPPED + skipped))
            fi
          done
          PASSED=$((TOTAL - FAILED - SKIPPED))

          cat > artifacts/test_stats.json <<EOF
          {
            "group": "$TC_GROUP:$TEST_MODE:${{ matrix.distro }}",
            "result": "$TEST_RESULT",
            "total": $TOTAL,
            "passed": $PASSED,
            "failed": $FAILED,
            "skipped": $SKIPPED
          }
          EOF

          echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped_count=$SKIPPED" >> $GITHUB_OUTPUT
          echo "Test stats for tc:$TC_GROUP ($TEST_MODE, ${{ matrix.distro }}): total=$TOTAL, passed=$PASSED, failed=$FAILED, skipped=$SKIPPED"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-tc-${{ matrix.tc_group }}-${{ matrix.use_fdw == 'true' && 'fdw' || 'external-table' }}-${{ matrix.distro }}
          path: artifacts/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Check test result
        if: always()
        run: |
          FAILED_COUNT="${{ steps.collect_artifacts.outputs.failed_count || 0 }}"
          if [ "${{ steps.run_test.outcome }}" == "failure" ] || [ "$FAILED_COUNT" -gt 0 ]; then
            echo "Testcontainer test ${{ matrix.tc_group }} (${{ matrix.test_mode }}, ${{ matrix.distro }}) failed (Failures: $FAILED_COUNT)"
            exit 1
          fi

  # Stage 3: Summary job
  test-summary:
    name: Test Summary
    needs: [pxf-test, pxf-test-rocky9, pxf-testcontainer-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Download all test artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts
        pattern: test-results-*

    - name: Generate summary
      run: |
        echo "## PXF Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        generate_os_summary() {
          local os_label="$1"
          local pattern="$2"

          # OS-level counters
          local OVERALL_TOTAL=0
          local OVERALL_PASSED=0
          local OVERALL_FAILED=0
          local OVERALL_SKIPPED=0
          local GROUPS_PASSED=0
          local GROUPS_FAILED=0
          local FAILED_GROUP_NAMES=""

          declare -A GROUP_STATS

          for dir in all-artifacts/${pattern}; do
            if [ -d "$dir" ] && [ -f "$dir/test_stats.json" ]; then
              group=$(cat "$dir/test_stats.json" | grep -oP '"group":\s*"\K[^"]+' || basename "$dir" | sed "s/${pattern%\*}//")
              result=$(cat "$dir/test_stats.json" | grep -oP '"result":\s*"\K[^"]+' || echo "unknown")
              total=$(cat "$dir/test_stats.json" | grep -oP '"total":\s*\K\d+' || echo "0")
              passed=$(cat "$dir/test_stats.json" | grep -oP '"passed":\s*\K\d+' || echo "0")
              failed=$(cat "$dir/test_stats.json" | grep -oP '"failed":\s*\K\d+' || echo "0")
              skipped=$(cat "$dir/test_stats.json" | grep -oP '"skipped":\s*\K\d+' || echo "0")

              GROUP_STATS[$group]="$result,$total,$passed,$failed,$skipped"

              OVERALL_TOTAL=$((OVERALL_TOTAL + total))
              OVERALL_PASSED=$((OVERALL_PASSED + passed))
              OVERALL_FAILED=$((OVERALL_FAILED + failed))
              OVERALL_SKIPPED=$((OVERALL_SKIPPED + skipped))

              if [ "$result" == "success" ] && [ "$failed" -eq 0 ]; then
                GROUPS_PASSED=$((GROUPS_PASSED + 1))
              else
                GROUPS_FAILED=$((GROUPS_FAILED + 1))
                FAILED_GROUP_NAMES="${FAILED_GROUP_NAMES}${group} "
              fi
            fi
          done

          echo "### ${os_label}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $GROUPS_FAILED -eq 0 ]; then
            echo "All ${GROUPS_PASSED} test groups passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "${GROUPS_FAILED} of $((GROUPS_PASSED + GROUPS_FAILED)) test groups failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Total Tests: $OVERALL_TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- Passed: $OVERALL_PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Failed: $OVERALL_FAILED" >> $GITHUB_STEP_SUMMARY
          echo "- Skipped: $OVERALL_SKIPPED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Test Group | Status | Passed | Failed | Skipped | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|-------:|-------:|--------:|------:|" >> $GITHUB_STEP_SUMMARY

          for group in $(echo "${!GROUP_STATS[@]}" | tr ' ' '\n' | sort); do
            IFS=',' read -r result total passed failed skipped <<< "${GROUP_STATS[$group]}"
            if [ "$result" == "success" ] && [ "$failed" -eq 0 ]; then
              status="PASS"
            else
              status="FAIL"
            fi
            echo "| $group | $status | $passed | $failed | $skipped | $total |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $GROUPS_FAILED -gt 0 ]; then
            echo "::error::${os_label}: ${GROUPS_FAILED} test group(s) failed: ${FAILED_GROUP_NAMES}"
            return 1
          fi
          return 0
        }

        EXIT_CODE=0

        # Ubuntu results (test-results-<group>, excluding test-results-rocky9-*)
        generate_os_summary "Ubuntu 22.04" "test-results-[!r]*" || EXIT_CODE=1

        # Rocky 9 results
        generate_os_summary "Rocky 9" "test-results-rocky9-*" || EXIT_CODE=1

        exit $EXIT_CODE
