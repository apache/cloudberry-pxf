# --------------------------------------------------------------------
# Lint documentation under docs/content/.
# Runs markdownlint for style and lychee for link validity. Triggers on
# pushes and pull requests that touch docs/.
# --------------------------------------------------------------------

name: docs-lint

on:
  push:
    branches: [main, REL_*]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-lint.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs-lint.yml'

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9
        with:
          globs: |
            docs/content/**/*.md
          config: docs/.markdownlint.jsonc

  link-check:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --exclude-mail
            --accept '200,206,429'
            './docs/content/**/*.md'
          fail: true
