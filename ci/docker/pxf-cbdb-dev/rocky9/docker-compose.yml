services:
# hadoop
  singlecluster:
    image: pxf/test-ready-rocky9:latest
    container_name: pxf_singlecluster_rocky9
    hostname: cdw

  pxf-cbdb-dev:
    image: pxf/test-ready-rocky9:latest
    container_name: pxf-cbdb-dev
    hostname: mdw
    depends_on:
      - singlecluster
    ports:
      - "2222:22"
    volumes:
      - ../../../../../cloudberry-pxf:/home/gpadmin/workspace/cloudberry-pxf
    command: ["tail", "-f", "/dev/null"]

networks:
  default:
    name: pxf-cbdb-ci
